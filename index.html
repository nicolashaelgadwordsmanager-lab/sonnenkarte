<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Sonnenkarte Winterthur</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --amber: #F59E0B;
  --amber-light: #FDE68A;
  --amber-dim: rgba(245,158,11,0.15);
  --bg: #0C0E16;
  --surface: rgba(18,21,35,0.96);
  --surface2: rgba(26,30,50,0.98);
  --border: rgba(255,255,255,0.08);
  --border-amber: rgba(245,158,11,0.3);
  --muted: #5A6480;
  --text: #EEF2FF;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%; height: 100dvh;
  overflow: hidden;
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ── FULL-SCREEN MAP ─────────────────────────────────── */
#map {
  position: fixed;
  inset: 0;
  z-index: 0;
}

#shadow-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 10;
  transition: opacity 0.15s ease;
}

/* ── TOP BAR ─────────────────────────────────────────── */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  padding-top: max(12px, env(safe-area-inset-top, 12px));
  background: linear-gradient(to bottom, rgba(12,14,22,0.92) 0%, rgba(12,14,22,0) 100%);
  pointer-events: none;
}

.logo {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 1.1rem;
  color: var(--amber);
  pointer-events: all;
}
.logo span {
  font-family: 'Outfit', sans-serif;
  font-style: normal;
  font-size: 0.6rem;
  color: var(--muted);
  display: block;
  font-weight: 300;
  margin-top: -2px;
}

.wx-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 11px;
  font-size: 0.72rem;
  color: var(--text);
  pointer-events: all;
  backdrop-filter: blur(12px);
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  user-select: none;
  -webkit-user-select: none;
}
.wx-badge:active { opacity: 0.8; }

/* Ideal weather mode — amber glow */
.wx-badge.ideal {
  border-color: rgba(245,158,11,0.5);
  background: rgba(30,24,10,0.95);
}
.wx-badge.ideal #wx-dot {
  background: var(--amber);
  animation: none;
}

.live-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #4ade80;
  animation: blink 2s infinite;
  flex-shrink: 0;
  transition: background 0.2s;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── MAP LAYER TOGGLES (floating, left side) ─────────── */
#layer-btns {
  position: fixed;
  left: 12px;
  bottom: 200px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: bottom 0.35s cubic-bezier(0.4,0,0.2,1);
}

.layer-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(12,14,24,0.95);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 10px 14px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Outfit', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  white-space: nowrap;
  -webkit-appearance: none;
  appearance: none;
  box-shadow: 0 2px 14px rgba(0,0,0,0.55);
  min-width: 130px;
}

.layer-btn .btn-icon { font-size: 1.1rem; line-height: 1; flex-shrink: 0; }
.layer-btn .btn-text { display: flex; flex-direction: column; gap: 1px; }
.layer-btn .btn-name { font-size: 0.78rem; font-weight: 600; line-height: 1.1; }
.layer-btn .btn-state { font-size: 0.6rem; line-height: 1.1; font-weight: 400; }

/* INACTIVE — text always readable, just dimmed */
.layer-btn:not(.active) {
  color: rgba(180,190,220,0.6);
  border-color: rgba(255,255,255,0.08);
}
.layer-btn:not(.active) .btn-name { color: rgba(200,210,235,0.75); }
.layer-btn:not(.active) .btn-state { color: rgba(150,160,190,0.55); }
.layer-btn:not(.active) .btn-icon { opacity: 0.45; }

/* ACTIVE SHADOW — amber */
.layer-btn.active {
  border-color: rgba(245,158,11,0.7);
  box-shadow: 0 2px 14px rgba(0,0,0,0.55), 0 0 0 1px rgba(245,158,11,0.2);
}
.layer-btn.active .btn-name { color: var(--amber); }
.layer-btn.active .btn-state { color: rgba(253,200,80,0.7); }

/* ACTIVE SUN — brighter amber glow */
.layer-btn.active.sun-active {
  border-color: var(--amber);
  box-shadow: 0 2px 14px rgba(0,0,0,0.55), 0 0 0 1px rgba(245,158,11,0.35);
}
.layer-btn.active.sun-active .btn-name { color: var(--amber-light); }
.layer-btn.active.sun-active .btn-state { color: rgba(253,230,138,0.65); }

/* ── BOTTOM SHEET ────────────────────────────────────── */
#sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 200;
  background: var(--surface2);
  border-top: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 0 16px;
  padding-bottom: max(16px, var(--safe-bottom));
  backdrop-filter: blur(20px);
  box-shadow: 0 -8px 32px rgba(0,0,0,0.4);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
}

/* Collapsed: show handle + mini slider strip */
#sheet.collapsed {
  transform: translateY(calc(100% - 108px));
}

/* Sheet header = always visible, contains handle + toggle */
.sheet-header {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 10px 0 6px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}

/* Drag handle */
.sheet-handle {
  width: 36px; height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
}

/* Collapse toggle arrow */
#sheet-toggle-btn {
  position: absolute;
  right: 0;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 0.75rem;
  cursor: pointer;
  padding: 4px 8px;
  -webkit-appearance: none;
  appearance: none;
  display: flex;
  align-items: center;
  gap: 4px;
  border-radius: 8px;
  transition: color 0.2s;
}
#sheet-toggle-btn:active { color: var(--text); }
#sheet-toggle-btn .arrow {
  display: inline-block;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  font-size: 0.9rem;
}
#sheet.collapsed #sheet-toggle-btn .arrow {
  transform: rotate(180deg);
}

/* Mini slider — always visible even when collapsed */
#mini-slider-row {
  display: none; /* hidden when expanded */
  align-items: center;
  gap: 10px;
  padding: 0 0 8px;
}
#sheet.collapsed #mini-slider-row {
  display: flex;
}
#sheet-body {
  overflow: hidden;
}
/* When collapsed, sheet-body slides away but mini-slider stays */
#sheet.collapsed #sheet-body {
  display: none;
}

.mini-time {
  font-family: 'Fraunces', serif;
  font-size: 1.1rem;
  color: var(--amber);
  flex-shrink: 0;
  min-width: 52px;
  line-height: 1;
}
.mini-now-btn {
  background: var(--amber-dim);
  border: 1px solid var(--border-amber);
  border-radius: 8px;
  padding: 5px 9px;
  color: var(--amber);
  font-family: 'Outfit', sans-serif;
  font-size: 0.7rem;
  cursor: pointer;
  -webkit-appearance: none;
  flex-shrink: 0;
}
.mini-slider-wrap {
  flex: 1;
  position: relative;
  height: 36px;
  display: flex;
  align-items: center;
}
.mini-track-bg {
  position: absolute;
  left: 0; top: 50%; transform: translateY(-50%);
  width: 100%; height: 5px; border-radius: 3px;
  pointer-events: none;
  background: linear-gradient(90deg,
    #07080f 0%,#07080f 20%,
    #1b3660 27%,#89c4e1 36%,
    #ffe88a 50%,#f59e0b 58%,
    #e05a1a 68%,#1b2f60 77%,
    #07080f 85%);
}

/* Only show collapse button on mobile */
@media (min-width: 640px) {
  #sheet-toggle-btn { display: none; }
  #sheet.collapsed { transform: none; }
  #mini-slider-row { display: none !important; }
  #sheet.collapsed #sheet-body { display: block; }
}

/* Sun status row */
#sun-status-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

#sun-emoji-big { font-size: 2rem; line-height: 1; flex-shrink: 0; }

.sun-text { flex: 1; min-width: 0; }
#sun-label {
  font-size: 1rem;
  font-weight: 600;
  color: var(--amber);
  line-height: 1.1;
}
#sun-sub { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

.sun-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
  flex-shrink: 0;
}
.sun-meta-item { font-size: 0.68rem; color: var(--muted); }
.sun-meta-item strong { color: var(--text); font-weight: 500; }

/* Time display + slider */
.time-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

.time-display {
  font-family: 'Fraunces', serif;
  font-size: 2rem;
  color: var(--amber);
  letter-spacing: 0.02em;
  line-height: 1;
  flex-shrink: 0;
  min-width: 90px;
}
.time-display small {
  font-size: 0.75rem;
  font-family: 'Outfit', sans-serif;
  color: var(--muted);
  margin-left: 3px;
}

/* Date button */
#date-btn {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 12px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.8rem;
  font-weight: 400;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  white-space: nowrap;
  position: relative;
}
#date-btn:active { background: var(--surface2); }
#date-input-hidden {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
  font-size: 16px; /* prevents iOS zoom */
}

/* Now button */
#now-btn {
  background: var(--amber-dim);
  border: 1px solid var(--border-amber);
  border-radius: 10px;
  padding: 8px 12px;
  color: var(--amber);
  font-family: 'Outfit', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  white-space: nowrap;
  flex-shrink: 0;
}
#now-btn:active { background: rgba(245,158,11,0.25); }

/* Slider */
.slider-wrap {
  position: relative;
  padding: 4px 0;
  margin-bottom: 6px;
}
.slider-track-bg {
  position: absolute;
  left: 0; top: 50%; transform: translateY(-50%);
  width: 100%; height: 6px; border-radius: 3px;
  background: linear-gradient(90deg,
    #07080f 0%,#07080f 20%,
    #1b3660 27%,#89c4e1 36%,
    #ffe88a 50%,#f59e0b 58%,
    #e05a1a 68%,#1b2f60 77%,
    #07080f 85%);
  pointer-events: none;
}
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 36px; /* big touch target */
  background: transparent;
  cursor: pointer;
  outline: none;
  position: relative;
  z-index: 2;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--amber);
  border: 3px solid #0c0e16;
  box-shadow: 0 0 0 1.5px var(--amber), 0 2px 12px rgba(245,158,11,0.6);
  cursor: grab;
  margin-top: -11px;
}
input[type="range"]::-webkit-slider-thumb:active { cursor: grabbing; }
input[type="range"]::-webkit-slider-runnable-track { height: 6px; background: transparent; }
/* Firefox */
input[type="range"]::-moz-range-thumb {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--amber); border: 3px solid #0c0e16;
  box-shadow: 0 0 0 1.5px var(--amber);
}
input[type="range"]::-moz-range-track { height: 6px; background: transparent; }

.time-marks {
  display: flex; justify-content: space-between;
  color: var(--muted); font-size: 0.5rem; opacity: 0.5;
}

/* ── LOADING ─────────────────────────────────────────── */
#loading {
  position: fixed; inset: 0;
  background: rgba(10,12,20,0.95);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; z-index: 9999;
  transition: opacity 0.5s, visibility 0.5s;
}
#loading.gone { opacity: 0; visibility: hidden; }
.spinner {
  width: 48px; height: 48px;
  border: 2px solid rgba(245,158,11,.12);
  border-top-color: var(--amber);
  border-radius: 50%;
  animation: spin .9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-title { font-size: .95rem; color: var(--text); font-weight: 500; }
.load-sub { font-size: .72rem; color: var(--muted); }
.load-hint { font-size: .65rem; color: var(--muted); opacity:.6; margin-top:4px; }

/* ── SUN SPLIT BUTTON ────────────────────────────────── */
.sun-btn {
  padding: 0 !important;
  overflow: hidden;
  gap: 0 !important;
  min-width: 130px;
}

.sun-half {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  padding: 10px 8px;
  gap: 3px;
  transition: background 0.2s, color 0.2s;
  color: rgba(200,210,235,0.25);
}
/* Off state: icon also greyscale */
.sun-btn:not(.state-actual):not(.state-ideal) .sun-half-icon {
  filter: grayscale(1) opacity(0.35);
}

.sun-half-icon { font-size: 1.0rem; line-height: 1; }
.sun-half-label {
  font-size: 0.55rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  line-height: 1;
  opacity: 0.8;
}

/* Vertical divider */
.sun-divider {
  width: 1px;
  align-self: stretch;
  background: rgba(255,255,255,0.08);
  flex-shrink: 0;
  transition: background 0.2s;
}

/* State: left half lit (aktuelles Wetter) */
.sun-btn.state-actual .sun-half.left {
  color: var(--amber);
  background: rgba(245,158,11,0.12);
}
.sun-btn.state-actual .sun-divider {
  background: rgba(245,158,11,0.25);
}

/* State: both halves lit (ideales Wetter) */
.sun-btn.state-ideal .sun-half.left {
  color: var(--amber-light);
  background: rgba(245,158,11,0.15);
}
.sun-btn.state-ideal .sun-half.right {
  color: var(--amber-light);
  background: rgba(245,158,11,0.22);
}
.sun-btn.state-ideal .sun-divider {
  background: rgba(245,158,11,0.4);
}
.sun-btn.state-ideal {
  border-color: var(--amber);
  box-shadow: 0 2px 14px rgba(0,0,0,0.55), 0 0 0 1px rgba(245,158,11,0.35);
}
.sun-btn.state-actual {
  border-color: rgba(245,158,11,0.5);
}

/* GPS button active state */
#gps-btn.active {
  border-color: rgba(74,222,128,0.6);
  background: rgba(12,14,24,0.95);
}
#gps-btn.active .btn-name { color: #4ade80; }
#gps-btn.active .btn-state { color: rgba(74,222,128,0.7); }
#gps-btn.locating .btn-icon { animation: pulse-gps 1s infinite; }
@keyframes pulse-gps { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Tree button active state */
#tree-btn.active {
  border-color: rgba(34,197,94,0.7);
  background: rgba(12,14,24,0.95);
}
#tree-btn.active .btn-name { color: #22c55e; }
#tree-btn.active .btn-state { color: rgba(34,197,94,0.7); }

/* ── SEARCH BOX ──────────────────────────────────────── */
#search-wrap {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  width: min(420px, calc(100vw - 24px));
}
#search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(12,14,24,0.95);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  padding: 10px 14px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  transition: border-color 0.2s;
}
#search-box:focus-within { border-color: rgba(245,158,11,0.5); }
#search-icon { font-size: 1rem; flex-shrink:0; opacity:0.5; }
#search-input {
  flex:1; background:none; border:none; outline:none;
  color: var(--text); font-family:'Outfit',sans-serif;
  font-size:0.9rem; min-width:0;
}
#search-input::placeholder { color: var(--muted); }
#search-clear {
  background:none; border:none; color:var(--muted);
  font-size:1rem; cursor:pointer; padding:0 2px;
  flex-shrink:0; display:none; line-height:1;
}
#search-clear.visible { display:block; }

#search-results {
  margin-top: 6px;
  background: rgba(12,14,24,0.97);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1.5px solid rgba(255,255,255,0.10);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  display: none;
}
#search-results.visible { display:block; }

.result-item {
  display:flex; align-items:center; gap:10px;
  padding:11px 14px; cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.05);
  transition: background 0.15s;
}
.result-item:last-child { border-bottom:none; }
.result-item:hover, .result-item:active { background:rgba(245,158,11,0.08); }
.result-icon { font-size:1rem; flex-shrink:0; opacity:0.7; }
.result-text { flex:1; min-width:0; }
.result-name { font-size:0.84rem; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.result-sub  { font-size:0.65rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
.result-msg  { padding:14px; text-align:center; color:var(--muted); font-size:0.78rem; }

/* ── LEAFLET OVERRIDES ───────────────────────────────── */
.leaflet-control-zoom {
  border: none !important;
  box-shadow: none !important;
}
.leaflet-control-zoom a {
  background: var(--surface) !important;
  color: var(--text) !important;
  border: 1px solid var(--border) !important;
  width: 36px !important; height: 36px !important;
  line-height: 36px !important;
  font-size: 1.1rem !important;
  backdrop-filter: blur(12px);
}
.leaflet-control-zoom a:hover { background: var(--surface2) !important; }
.leaflet-control-attribution { display: none !important; }

/* ── INFO PILL (top of map, mobile hidden) ───────────── */
#info-pill {
  position: fixed;
  top: 60px; left: 50%; transform: translateX(-50%);
  z-index: 90;
  background: var(--surface);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  display: flex; align-items: center; gap: 12px;
  font-size: 0.68rem; color: var(--muted);
  pointer-events: none; white-space: nowrap;
}
#info-pill strong { color: var(--amber-light); font-weight: 500; }

/* ── LEGEND ──────────────────────────────────────────── */
#legend {
  position: fixed;
  bottom: 16px; right: 12px;
  z-index: 90;
  background: var(--surface);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.65rem;
}
.leg-title { color:var(--muted);font-size:.55rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px; }
.leg-row { display:flex;align-items:center;gap:8px;margin-bottom:4px; }
.leg-row:last-child{margin-bottom:0;}
.leg-sw { width:14px;height:9px;border-radius:2px;flex-shrink:0; }

/* ── RESPONSIVE ──────────────────────────────────────── */
@media (min-width: 640px) {
  /* Desktop: info pill visible */
  #info-pill { top: 60px; }
  .layer-btn { font-size: 0.78rem; padding: 10px 15px; }
}

@media (max-width: 639px) {
  /* Mobile: hide info pill (data shown in sheet instead) */
  #info-pill { display: none; }
  #legend { display: none; }

}
</style>
</head>

    <span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>24:00</span>
  </div>

  </div><!-- /sheet-body -->

<script>
// ── CONFIG ────────────────────────────────────────────
const LAT = 47.4988, LNG = 8.7269;
const BBOX = '47.485,8.705,47.515,8.750';

// ── MAP ───────────────────────────────────────────────
const map = L.map('map', {
  center: [LAT, LNG], zoom: 15,
  zoomControl: false,
  attributionControl: false
});
L.control.zoom({ position: 'bottomright' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  maxZoom: 19, subdomains: 'abcd'
}).addTo(map);

// ── CANVAS ────────────────────────────────────────────
const canvas = document.getElementById('shadow-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); positionLayerBtns(); scheduleRender(); });

// ── UTILS ─────────────────────────────────────────────
const R2D = r => r * 180 / Math.PI;
const D2R = d => d * Math.PI / 180;
const pad = n => String(Math.floor(Math.abs(n))).padStart(2,'0');
const fmtMin = m => `${pad(m/60)}:${pad(m%60)}`;
const fmtTime = d => `${pad(d.getHours())}:${pad(d.getMinutes())}`;

function geoToCanvas(lat, lng) {
  const p = map.latLngToContainerPoint(L.latLng(lat, lng));
  return [p.x, p.y];
}
function movePoint(lat, lng, bearingDeg, meters) {
  const R=6371000, d=meters/R, b=D2R(bearingDeg);
  const φ1=D2R(lat), λ1=D2R(lng);
  const φ2=Math.asin(Math.sin(φ1)*Math.cos(d)+Math.cos(φ1)*Math.sin(d)*Math.cos(b));
  const λ2=λ1+Math.atan2(Math.sin(b)*Math.sin(d)*Math.cos(φ1),Math.cos(d)-Math.sin(φ1)*Math.sin(φ2));
  return [R2D(φ2), R2D(λ2)];
}

// ── LAYER BUTTON POSITIONING ──────────────────────────
function positionLayerBtns() {
  const sheet    = document.getElementById('sheet');
  const btns     = document.getElementById('layer-btns');
  const isMobile = window.innerWidth < 640;
  const collapsed = sheet.classList.contains('collapsed');

  let offset;
  if (isMobile && collapsed) {
    // mini slider strip height (108px) + safe margin
    offset = 108 + 16;
  } else {
    offset = sheet.offsetHeight + 12;
  }
  btns.style.bottom = offset + 'px';
}

// ── SHEET COLLAPSE ─────────────────────────────────────
let sheetCollapsed = false;

function toggleSheet() {
  const isMobile = window.innerWidth < 640;
  if (!isMobile) return;

  sheetCollapsed = !sheetCollapsed;
  const sheet = document.getElementById('sheet');
  const label = document.getElementById('sheet-toggle-label');

  sheet.classList.toggle('collapsed', sheetCollapsed);
  label.textContent = sheetCollapsed ? 'Ausklappen' : 'Einklappen';

  // Wait for transition then reposition buttons
  setTimeout(positionLayerBtns, 360);
}

// ── WEATHER ───────────────────────────────────────────
let weather = {
  temp: null,
  desc: null,
  emoji: '☀️',
  cloudCover: 0,
  isRaining: false,
  sunIntensity: 1.0
};
let weatherIdealMode = false;

function toggleWeatherMode() {
  // Badge click cycles: off→actual, actual→ideal, ideal→actual
  if (sunState === 0) sunState = 1;
  else if (sunState === 1) sunState = 2;
  else sunState = 1;
  applySunState();
}

function updateWeatherBadge() {
  const text = document.getElementById('wx-text');
  if (weather.temp !== null) {
    text.textContent = `${weather.temp}°C · ${weather.emoji} ${weather.desc}`;
  } else {
    text.textContent = '☀️ Winterthur';
  }
}

function getEffectiveSunIntensity() {
  if (weatherIdealMode) return 1.0;
  return weather.sunIntensity;
}

async function loadWeather() {
  try {
    // Open-Meteo: free, no API key, very reliable
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=47.4988&longitude=8.7269' +
      '&current=temperature_2m,cloud_cover,precipitation,weathercode,is_day' +
      '&timezone=Europe/Zurich';
    const resp = await fetch(url);
    const data = await resp.json();
    const c = data.current;

    weather.temp      = Math.round(c.temperature_2m);
    weather.cloudCover = c.cloud_cover;       // 0-100
    weather.isRaining  = c.precipitation > 0;

    // WMO weather code → emoji + description
    const wc = c.weathercode;
    let emoji, desc;
    if      (wc === 0)              { emoji='☀️';  desc='Klar'; }
    else if (wc <= 2)               { emoji='🌤️';  desc='Leicht bewölkt'; }
    else if (wc === 3)              { emoji='☁️';  desc='Bewölkt'; }
    else if (wc <= 49)              { emoji='🌫️';  desc='Neblig'; }
    else if (wc <= 55)              { emoji='🌦️';  desc='Nieselregen'; }
    else if (wc <= 65)              { emoji='🌧️';  desc='Regen'; }
    else if (wc <= 77)              { emoji='🌨️';  desc='Schnee'; }
    else if (wc <= 82)              { emoji='🌧️';  desc='Regenschauer'; }
    else if (wc <= 86)              { emoji='🌨️';  desc='Schneeschauer'; }
    else                            { emoji='⛈️';  desc='Gewitter'; }

    weather.emoji = emoji;
    weather.desc  = desc;

    // Sun intensity based on cloud cover + rain
    // Clear (0-20%) → 1.0, Partly cloudy (20-60%) → 0.6, Overcast (60-90%) → 0.25, Rain → 0.05
    if (weather.isRaining) {
      weather.sunIntensity = 0.05;
    } else if (weather.cloudCover >= 90) {
      weather.sunIntensity = 0.15;
    } else if (weather.cloudCover >= 60) {
      weather.sunIntensity = 0.35;
    } else if (weather.cloudCover >= 20) {
      weather.sunIntensity = 0.65;
    } else {
      weather.sunIntensity = 1.0;
    }

    // Update badge and sun button icon (only if not in ideal mode)
    if (!weatherIdealMode) {
      updateWeatherBadge();
      updateSunButtonIcon();
    }

    // Re-render with new weather
    scheduleRender();

    console.log('Weather loaded:', weather);
  } catch(e) {
    console.warn('Weather failed:', e.message);
    // Keep defaults — sunny
  }
}

// ── BUILDINGS ─────────────────────────────────────────
let buildings = [];
let shadowsOn = true;
let sunHighlightOn = true;

// ── TREES & FORESTS ───────────────────────────────────
let trees = [];       // {lat, lng, h, r} individual trees
let forests = [];     // {ring} forest/wood polygons
let treesOn = false;

async function loadBuildings() {
  // Try local static file first (fast, no API limits)
  // Falls back to Overpass API mirrors if not found
  const sources = [
    'buildings.json',
    'https://overpass-api.de/api/interpreter?data=' + encodeURIComponent('[out:json][timeout:60];(way["building"](47.485,8.705,47.515,8.750););out body;>;out skel qt;'),
    'https://overpass.kumi.systems/api/interpreter?data=' + encodeURIComponent('[out:json][timeout:60];(way["building"](47.485,8.705,47.515,8.750););out body;>;out skel qt;'),
    'https://maps.mail.ru/osm/tools/overpass/api/interpreter?data=' + encodeURIComponent('[out:json][timeout:60];(way["building"](47.485,8.705,47.515,8.750););out body;>;out skel qt;'),
  ];

  let data = null;
  for (const src of sources) {
    try {
      const label = src.startsWith('buildings') ? 'lokale Datei' : new URL(src).hostname;
      document.getElementById('load-sub').textContent = 'Lade von ' + label + '...';
      const resp = await fetch(src);
      if (!resp.ok) continue;
      data = await resp.json();
      if (data && data.elements && data.elements.length) {
        console.log('Loaded from:', label, data.elements.length, 'elements');
        break;
      }
    } catch(e) { console.warn('Source failed:', src.substring(0,50), e.message); }
  }
  if (!data || !data.elements) throw new Error('Keine Gebäudedaten verfügbar');

  const nodes = {};
  for (const el of data.elements)
    if (el.type==='node') nodes[el.id]=[el.lat,el.lon];

  for (const el of data.elements) {
    if (el.type==='way' && el.tags?.building) {
      const ring = (el.nodes||[]).map(id=>nodes[id]).filter(Boolean);
      if (ring.length < 3) continue;
      const t = el.tags;
      let h;
      if (t['height']) {
        h = parseFloat(t['height']);
      } else if (t['building:levels']) {
        h = parseFloat(t['building:levels']) * 3.2;
      } else {
        // Smart height estimate based on building type
        const type = (t['building'] || '').toLowerCase();
        if      (['church','chapel','place_of_worship'].includes(type))  h = 15;
        else if (['cathedral','basilica'].includes(type))                h = 25;
        else if (['house','detached','terrace','bungalow'].includes(type)) h = 6;
        else if (['apartments','residential','block'].includes(type))    h = 12;
        else if (['office','commercial','bank'].includes(type))          h = 14;
        else if (['retail','shop','supermarket','kiosk'].includes(type)) h = 5;
        else if (['industrial','warehouse','factory'].includes(type))    h = 10;
        else if (['garage','garages','carport'].includes(type))          h = 3;
        else if (['shed','hut','container','cabin'].includes(type))      h = 3;
        else if (['school','kindergarten'].includes(type))               h = 9;
        else if (['university','college'].includes(type))                h = 11;
        else if (['hospital','clinic'].includes(type))                   h = 16;
        else if (['hotel'].includes(type))                               h = 18;
        else if (['stadium','sports_hall','sports_centre'].includes(type)) h = 12;
        else if (['train_station','transportation'].includes(type))      h = 10;
        else if (['parking','parking_garage'].includes(type))            h = 9;
        else if (['farm','barn','stable'].includes(type))                h = 6;
        else if (['greenhouse'].includes(type))                          h = 4;
        else                                                             h = 8; // generic fallback
      }
      // Sanity clamp: nothing under 2.5m or over 120m
      h = Math.max(2.5, Math.min(120, h));
      buildings.push({ ring, h });
    }
  }
  document.getElementById('p-bldg').textContent = buildings.length.toLocaleString();
}

// ── LOAD TREES & FORESTS ─────────────────────────────
async function loadTrees() {
  const BBOX = '47.485,8.705,47.515,8.750';

  const sources_trees = [
    'trees.json',
    'https://overpass-api.de/api/interpreter?data=' + encodeURIComponent(`[out:json][timeout:60];(node["natural"="tree"](${BBOX}););out body qt;`),
    'https://overpass.kumi.systems/api/interpreter?data=' + encodeURIComponent(`[out:json][timeout:60];(node["natural"="tree"](${BBOX}););out body qt;`),
  ];

  const sources_forests = [
    'forests.json',
    'https://overpass-api.de/api/interpreter?data=' + encodeURIComponent(`[out:json][timeout:60];(way["natural"="wood"](${BBOX});way["landuse"="forest"](${BBOX}););out body;>;out skel qt;`),
    'https://overpass.kumi.systems/api/interpreter?data=' + encodeURIComponent(`[out:json][timeout:60];(way["natural"="wood"](${BBOX});way["landuse"="forest"](${BBOX}););out body;>;out skel qt;`),
  ];

  // Load individual trees
  for (const src of sources_trees) {
    try {
      const resp = await fetch(src);
      if (!resp.ok) continue;
      const data = await resp.json();
      if (!data?.elements?.length) continue;
      for (const el of data.elements) {
        if (el.type === 'node' && el.lat && el.lon) {
          const t = el.tags || {};
          // height: use tag or estimate from circumference/species
          const h = t['height'] ? parseFloat(t['height'])
                  : t['est_height'] ? parseFloat(t['est_height'])
                  : 6; // default 6m (conservative — taller buildings already cast shadow)
          // crown radius: use tag or estimate
          const r = t['crown_diameter'] ? parseFloat(t['crown_diameter']) / 2
                  : h * 0.35; // estimate: crown ~35% of height as radius
          trees.push({ lat: el.lat, lng: el.lon, h, r });
        }
      }
      console.log('Trees loaded:', trees.length, 'from', src.substring(0,40));
      break;
    } catch(e) { console.warn('Trees source failed:', e.message); }
  }

  // Load forests/woods
  for (const src of sources_forests) {
    try {
      const resp = await fetch(src);
      if (!resp.ok) continue;
      const data = await resp.json();
      if (!data?.elements?.length) continue;
      const nodes = {};
      for (const el of data.elements)
        if (el.type === 'node') nodes[el.id] = [el.lat, el.lon];
      for (const el of data.elements) {
        if (el.type === 'way' && (el.tags?.natural === 'wood' || el.tags?.landuse === 'forest')) {
          const ring = (el.nodes || []).map(id => nodes[id]).filter(Boolean);
          if (ring.length >= 3) forests.push({ ring });
        }
      }
      console.log('Forests loaded:', forests.length, 'from', src.substring(0,40));
      break;
    } catch(e) { console.warn('Forests source failed:', e.message); }
  }
}

// ── TOGGLES ───────────────────────────────────────────
function toggleShadows() {
  shadowsOn = !shadowsOn;
  const btn = document.getElementById('shadow-toggle');
  const state = document.getElementById('shadow-state');
  btn.classList.toggle('active', shadowsOn);
  state.textContent = shadowsOn ? 'Ein' : 'Aus';
  scheduleRender();
}

// Sun button: 3 states — off → actual → ideal → off
// 0=off, 1=actual weather, 2=ideal
let sunState = 1; // start with actual weather on

function updateSunButtonIcon() {
  const iconEl = document.getElementById('sun-left-icon');
  if (!iconEl) return;
  if (sunState === 2) {
    iconEl.textContent = '☀️'; // ideal = always sun
  } else {
    // off or actual = show real weather emoji
    iconEl.textContent = weather.emoji || '☀️';
  }
}

function cycleSun() {
  sunState = (sunState + 1) % 3;
  applySunState();
}

function applySunState() {
  const btn = document.getElementById('sun-toggle');
  btn.classList.remove('state-actual', 'state-ideal', 'active', 'sun-active');

  if (sunState === 0) {
    sunHighlightOn = false;
    weatherIdealMode = false;
  } else if (sunState === 1) {
    sunHighlightOn = true;
    weatherIdealMode = false;
    btn.classList.add('state-actual', 'active');
  } else {
    sunHighlightOn = true;
    weatherIdealMode = true;
    btn.classList.add('state-ideal', 'active', 'sun-active');
  }

  updateSunButtonIcon();

  // Sync weather badge
  const badge = document.getElementById('wx-badge');
  if (badge) badge.classList.toggle('ideal', weatherIdealMode);
  if (!weatherIdealMode) updateWeatherBadge();
  else document.getElementById('wx-text').textContent = '✦ Ideales Wetter';

  scheduleRender();
}

function toggleTrees() {
  treesOn = !treesOn;
  const btn = document.getElementById('tree-btn');
  const state = document.getElementById('tree-state');
  btn.classList.toggle('active', treesOn);
  state.textContent = treesOn ? 'Ein' : 'Aus';
  scheduleRender();
}

// ── RENDER ────────────────────────────────────────────
let renderPending = false;
function scheduleRender() {
  if (!renderPending) {
    renderPending = true;
    requestAnimationFrame(() => { renderPending=false; render(); });
  }
}

function render() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  const dt = getDateTime();
  const pos = SunCalc.getPosition(dt, LAT, LNG);
  const altDeg = R2D(pos.altitude);
  const azCompass = (R2D(pos.azimuth)+180+360)%360;
  const shadowDir = (azCompass+180)%360;

  if (altDeg < -8) {
    ctx.fillStyle = 'rgba(4,5,18,0.82)';
    ctx.fillRect(0,0,W,H);
    return;
  }
  if (altDeg < 0) {
    const t = Math.min(1, -altDeg/8);
    ctx.fillStyle = `rgba(4,5,18,${(t*0.55).toFixed(2)})`;
    ctx.fillRect(0,0,W,H);
  }

  const anyActive = shadowsOn || sunHighlightOn || treesOn;
  if (!anyActive || altDeg < 1) return;

  const mult = Math.min(1/Math.tan(Math.max(pos.altitude, D2R(1))), 20);

  // ── BUILDING SHADOW MASK ──────────────────────────────
  const off = new OffscreenCanvas(W, H);
  const octx = off.getContext('2d');
  octx.fillStyle = '#000';

  if (shadowsOn || sunHighlightOn) {
    // Sun direction vector in canvas space (unit vector pointing FROM sun)
    const sunDirRad = D2R(shadowDir);
    const sdx = Math.sin(sunDirRad);
    const sdy = -Math.cos(sunDirRad); // canvas Y is flipped

    for (const bld of buildings) {
      const shadowLen = bld.h * mult;
      if (shadowLen < 0.5) continue;

      // Project all base vertices to canvas pixels
      const ring = bld.ring;
      const n = ring.length;
      const basePx = ring.map(([la,ln]) => geoToCanvas(la,ln));

      // For each edge, determine if it's a silhouette edge
      // (faces away from sun = shadow edge)
      // Edge normal points outward; if dot(normal, sunDir) < 0 → backface → shadow edge
      const shadowEdges = []; // pairs of [i, j] indices

      for (let i = 0; i < n; i++) {
        const j = (i + 1) % n;
        const [x1, y1] = basePx[i];
        const [x2, y2] = basePx[j];
        // Edge vector
        const ex = x2 - x1, ey = y2 - y1;
        // Outward normal (perpendicular, pointing right of edge direction)
        const nx = ey, ny = -ex;
        // Dot with sun direction
        const dot = nx * sdx + ny * sdy;
        if (dot < 0) shadowEdges.push([i, j]);
      }

      if (shadowEdges.length === 0) continue;

      // Convert shadow length from meters to pixels
      // Use a reference pixel size at this location
      const [refLat, refLng] = ring[0];
      const [rx1, ry1] = geoToCanvas(refLat, refLng);
      const [refLat2, refLng2] = movePoint(refLat, refLng, shadowDir, shadowLen);
      const [rx2, ry2] = geoToCanvas(refLat2, refLng2);
      const pixelOffsetX = rx2 - rx1;
      const pixelOffsetY = ry2 - ry1;

      // Draw shadow volume: for each shadow edge, create a quad
      // from the edge extruded in shadow direction
      octx.beginPath();

      // First draw the building footprint
      octx.moveTo(basePx[0][0], basePx[0][1]);
      for (let i = 1; i < n; i++) octx.lineTo(basePx[i][0], basePx[i][1]);
      octx.closePath();
      octx.fill();

      // Then draw extruded quads for each shadow edge
      for (const [i, j] of shadowEdges) {
        const [x1, y1] = basePx[i];
        const [x2, y2] = basePx[j];
        // Extruded points
        const x3 = x2 + pixelOffsetX, y3 = y2 + pixelOffsetY;
        const x4 = x1 + pixelOffsetX, y4 = y1 + pixelOffsetY;

        octx.beginPath();
        octx.moveTo(x1, y1);
        octx.lineTo(x2, y2);
        octx.lineTo(x3, y3);
        octx.lineTo(x4, y4);
        octx.closePath();
        octx.fill();
      }
    }
  }

  // ── TREE & FOREST SHADOW MASK ─────────────────────────
  const treeOff = new OffscreenCanvas(W, H);
  const toctx = treeOff.getContext('2d');
  toctx.fillStyle = '#000';

  if (treesOn) {
    // 1. Forests: full dark coverage (no sun penetrates dense forest)
    for (const f of forests) {
      const px = f.ring.map(([la,ln]) => geoToCanvas(la,ln));
      if (px.length < 3) continue;
      toctx.beginPath();
      toctx.moveTo(px[0][0],px[0][1]);
      for (let i=1;i<px.length;i++) toctx.lineTo(px[i][0],px[i][1]);
      toctx.closePath(); toctx.fill();
    }

    // 2. Individual trees: elliptical shadow cast in shadow direction
    for (const tree of trees) {
      const shadowLen = tree.h * mult;
      if (shadowLen < 0.5) continue;

      // Shadow tip = center of shadow cast
      const [sLat, sLng] = movePoint(tree.lat, tree.lng, shadowDir, shadowLen * 0.7);
      const [cx, cy] = geoToCanvas(sLat, sLng);

      // Crown radius in pixels
      const [bx, by] = geoToCanvas(tree.lat, tree.lng);
      const [rx2, ry2] = geoToCanvas(...movePoint(tree.lat, tree.lng, 90, tree.r));
      const crownPx = Math.max(3, Math.sqrt((rx2-bx)**2 + (ry2-by)**2));

      // Shadow ellipse: elongated in shadow direction
      const elongation = Math.min(shadowLen / tree.h, 4);
      const shadowDirRad = D2R(shadowDir - 90); // canvas rotation

      toctx.save();
      toctx.translate(cx, cy);
      toctx.rotate(shadowDirRad);
      toctx.beginPath();
      toctx.ellipse(0, 0, crownPx * elongation * 0.6, crownPx, 0, 0, Math.PI * 2);
      toctx.fill();
      toctx.restore();
    }

    // Remove tree shadows where building shadows already cover (avoid double shadow)
    toctx.globalCompositeOperation = 'destination-out';
    toctx.drawImage(off, 0, 0);
    toctx.globalCompositeOperation = 'source-over';

    // Draw forest/tree shadow overlay (dark green)
    const forestAlpha = altDeg > 20 ? 0.78 : 0.65;
    const ft = new OffscreenCanvas(W,H);
    const ftc = ft.getContext('2d');
    ftc.fillStyle = `rgba(10,40,15,${forestAlpha})`;
    ftc.fillRect(0,0,W,H);
    ftc.globalCompositeOperation = 'destination-in';
    ftc.drawImage(treeOff,0,0);
    ctx.drawImage(ft,0,0);
  }

  // ── STEP 1: Sun highlight (yellow, outside building shadows) ──────────
  if (sunHighlightOn) {
    // Apply weather cloud cover to sun intensity
    const baseA = altDeg > 35 ? 0.50 : altDeg > 20 ? 0.40 : altDeg > 8 ? 0.30 : 0.18;
    const a = baseA * getEffectiveSunIntensity();
    const s = new OffscreenCanvas(W,H);
    const sc = s.getContext('2d');
    sc.fillStyle = `rgba(255,222,20,${a.toFixed(3)})`;
    sc.fillRect(0,0,W,H);
    // Remove building shadows from yellow
    sc.globalCompositeOperation = 'destination-out';
    sc.drawImage(off,0,0);
    // Also remove forest/tree areas from yellow (they're not sunny)
    if (treesOn) {
      sc.drawImage(treeOff,0,0);
    }
    ctx.drawImage(s,0,0);
  }

  // ── STEP 2: Building shadow overlay (blue-navy) ───────────────────────
  // Overcast/rain = shadows much softer (diffuse light)
  if (shadowsOn) {
    const baseA = altDeg > 35 ? 0.72 : altDeg > 20 ? 0.62 : altDeg > 10 ? 0.52 : 0.40;
    const a = baseA * Math.max(0.15, getEffectiveSunIntensity());
    const t = new OffscreenCanvas(W,H);
    const tc = t.getContext('2d');
    tc.fillStyle = `rgba(12,20,75,${a})`;
    tc.fillRect(0,0,W,H);
    tc.globalCompositeOperation = 'destination-in';
    tc.drawImage(off,0,0);
    ctx.drawImage(t,0,0);
  }

  // ── STEP 3: Weather overlay ───────────────────────────────────────────
  // Overcast → grey tint, Rain → blue-grey tint (skipped in ideal mode)
  if (!weatherIdealMode && weather.isRaining && altDeg > -8) {
    ctx.fillStyle = 'rgba(80,100,130,0.18)';
    ctx.fillRect(0,0,W,H);
  } else if (!weatherIdealMode && weather.cloudCover >= 80 && altDeg > -8) {
    const cloudA = ((weather.cloudCover - 80) / 20) * 0.12;
    ctx.fillStyle = `rgba(100,110,130,${cloudA.toFixed(3)})`;
    ctx.fillRect(0,0,W,H);
  }
}

// ── DATE / TIME ───────────────────────────────────────
function getDateTime() {
  const mins = parseInt(document.getElementById('time-slider').value);
  const [y,mo,d] = document.getElementById('date-input-hidden').value.split('-').map(Number);
  return new Date(y, mo-1, d, Math.floor(mins/60), mins%60, 0);
}

function formatDateDisplay(dateStr) {
  const [y,mo,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, mo-1, d);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((dt - today) / 86400000);
  if (diff === 0) return 'Heute';
  if (diff === 1) return 'Morgen';
  if (diff === -1) return 'Gestern';
  return dt.toLocaleDateString('de-CH', { day:'numeric', month:'short' });
}

function update() {
  const mins = parseInt(document.getElementById('time-slider').value);
  document.getElementById('time-val').innerHTML = `${fmtMin(mins)}<small>Uhr</small>`;
  // Sync mini slider
  document.getElementById('mini-time-slider').value = mins;
  document.getElementById('mini-time-val').textContent = fmtMin(mins);

  const dt = getDateTime();
  const pos = SunCalc.getPosition(dt, LAT, LNG);
  const times = SunCalc.getTimes(dt, LAT, LNG);
  const altDeg = R2D(pos.altitude);
  const azDeg  = (R2D(pos.azimuth)+180+360)%360;

  document.getElementById('p-el').textContent   = altDeg.toFixed(1)+'°';
  document.getElementById('p-az').textContent   = azDeg.toFixed(0)+'°';
  document.getElementById('p-rise').textContent = fmtTime(times.sunrise);
  document.getElementById('p-set').textContent  = fmtTime(times.sunset);
  document.getElementById('sc-rise').textContent = fmtTime(times.sunrise);
  document.getElementById('sc-set').textContent  = fmtTime(times.sunset);

  let emoji, label, sub;
  if      (altDeg < -18) { emoji='🌑'; label='Tiefe Nacht';       sub='Keine Sonne'; }
  else if (altDeg <  -6) { emoji='🌌'; label='Dämmerung';         sub='Kein direktes Licht'; }
  else if (altDeg <   0) { emoji='🌅'; label='Dämmerung';          sub='Diffuses Licht'; }
  else if (altDeg <   6) { emoji='🌄'; label='Auf-/Untergang';     sub='Sehr lange Schatten'; }
  else if (altDeg <  20) { emoji='🌤️'; label='Tiefe Sonne';        sub='Lange Schatten'; }
  else if (altDeg <  40) { emoji='☀️'; label='Gute Sonne';          sub='Moderate Schatten'; }
  else                   { emoji='🌞'; label='Hochsonne';           sub='Kaum Schatten'; }

  document.getElementById('sun-emoji-big').textContent = emoji;
  document.getElementById('sun-label').textContent = label;

  // Update sub with clock inline
  const clockEl = document.getElementById('clock');
  document.getElementById('sun-sub').innerHTML = `${sub} · <span id="clock">${clockEl ? clockEl.textContent : '--:--'}</span> Uhr`;

  scheduleRender();
}

// ── LIVE MODE ─────────────────────────────────────────
let liveMode = true; // starts in live mode

function setLiveMode(active) {
  liveMode = active;
  const btn = document.getElementById('now-btn');
  const miniBtn = document.querySelector('.mini-now-btn');
  if (active) {
    if (btn) btn.textContent = '⏱ Live';
    if (miniBtn) miniBtn.textContent = 'Live';
  } else {
    if (btn) btn.textContent = '⏱ Jetzt';
    if (miniBtn) miniBtn.textContent = 'Jetzt';
  }
}

function goNow() {
  const n = new Date();
  const mins = n.getHours()*60 + n.getMinutes();
  document.getElementById('time-slider').value = mins;
  document.getElementById('mini-time-slider').value = mins;
  const iso = n.toISOString().split('T')[0];
  document.getElementById('date-input-hidden').value = iso;
  document.getElementById('date-display').textContent = 'Heute';
  setLiveMode(true);
  update();
}

// ── INIT ──────────────────────────────────────────────
const today = new Date();
const iso = today.toISOString().split('T')[0];
document.getElementById('date-input-hidden').value = iso;
document.getElementById('date-display').textContent = 'Heute';
document.getElementById('time-slider').value = today.getHours()*60+today.getMinutes();

document.getElementById('time-slider').addEventListener('input', () => {
  setLiveMode(false); // user is manually controlling
  update();
});
document.getElementById('mini-time-slider').addEventListener('input', () => {
  document.getElementById('time-slider').value = document.getElementById('mini-time-slider').value;
  setLiveMode(false);
  update();
});

document.getElementById('date-input-hidden').addEventListener('change', function() {
  document.getElementById('date-display').textContent = formatDateDisplay(this.value);
  update();
});

map.on('movestart zoomstart', () => { canvas.style.opacity='0'; });
map.on('moveend zoomend', () => { canvas.style.opacity='1'; scheduleRender(); });
window.addEventListener('resize', () => { resizeCanvas(); positionLayerBtns(); scheduleRender(); });

// Live clock
setInterval(() => {
  const n = new Date();
  const t = fmtTime(n);
  const el = document.getElementById('clock');
  if (el) el.textContent = t;
}, 1000);

// Auto-advance slider every minute in live mode
setInterval(() => {
  if (liveMode) goNow();
}, 60000);

// When user returns to tab — snap to current time if in live mode
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && liveMode) goNow();
});

// Load and go
// Set initial badge text before weather loads
document.getElementById('wx-text').textContent = '☀️ Winterthur';

// Start in live mode
setLiveMode(true);

// Set initial sun button state (state-actual = on by default)
document.getElementById('sun-toggle').classList.add('state-actual', 'active');
updateSunButtonIcon();

Promise.allSettled([
  loadBuildings(),
  loadTrees(),
  loadWeather()
]).then(() => {
  document.getElementById('loading').classList.add('gone');
  positionLayerBtns();
  update();
});

// Refresh weather every 15 minutes
setInterval(loadWeather, 15 * 60 * 1000);

// ── GPS / STANDORT ───────────────────────────────────
let gpsActive = false;
let gpsWatchId = null;
let gpsMarker = null;
let gpsAccuracyCircle = null;

function toggleGPS() {
  if (!gpsActive) {
    startGPS();
  } else {
    stopGPS();
  }
}

function startGPS() {
  if (!navigator.geolocation) {
    alert('GPS wird von diesem Browser nicht unterstützt.');
    return;
  }

  const btn = document.getElementById('gps-btn');
  const state = document.getElementById('gps-state');
  btn.classList.add('active', 'locating');
  state.textContent = 'Suche...';

  gpsWatchId = navigator.geolocation.watchPosition(
    (pos) => {
      const { latitude: lat, longitude: lng, accuracy } = pos.coords;

      btn.classList.remove('locating');
      btn.classList.add('active');
      state.textContent = 'Aktiv';
      gpsActive = true;

      // Remove old markers
      if (gpsMarker) map.removeLayer(gpsMarker);
      if (gpsAccuracyCircle) map.removeLayer(gpsAccuracyCircle);

      // Accuracy circle (light blue)
      gpsAccuracyCircle = L.circle([lat, lng], {
        radius: accuracy,
        color: '#3b82f6',
        fillColor: '#3b82f6',
        fillOpacity: 0.08,
        weight: 1,
        opacity: 0.4,
        interactive: false
      }).addTo(map);

      // Position dot
      gpsMarker = L.circleMarker([lat, lng], {
        radius: 9,
        color: '#fff',
        fillColor: '#3b82f6',
        fillOpacity: 1,
        weight: 2.5,
        interactive: false
      }).addTo(map);

      // Fly to location only on first fix
      if (!gpsActive) {
        map.flyTo([lat, lng], 17, { duration: 1.5 });
      }
      gpsActive = true;
    },
    (err) => {
      console.warn('GPS error:', err.message);
      const btn = document.getElementById('gps-btn');
      const state = document.getElementById('gps-state');
      btn.classList.remove('active', 'locating');
      state.textContent = 'Fehler';
      gpsActive = false;

      if (err.code === 1) {
        alert('GPS-Zugriff verweigert. Bitte in den Browser-Einstellungen erlauben.');
      }
    },
    {
      enableHighAccuracy: true,
      maximumAge: 5000,
      timeout: 15000
    }
  );

  // Fly to current location immediately
  navigator.geolocation.getCurrentPosition(
    (pos) => map.flyTo([pos.coords.latitude, pos.coords.longitude], 17, { duration: 1.5 }),
    () => {}
  );
}

function stopGPS() {
  if (gpsWatchId !== null) {
    navigator.geolocation.clearWatch(gpsWatchId);
    gpsWatchId = null;
  }
  if (gpsMarker) { map.removeLayer(gpsMarker); gpsMarker = null; }
  if (gpsAccuracyCircle) { map.removeLayer(gpsAccuracyCircle); gpsAccuracyCircle = null; }

  gpsActive = false;
  const btn = document.getElementById('gps-btn');
  const state = document.getElementById('gps-state');
  btn.classList.remove('active', 'locating');
  state.textContent = 'Aus';
}

// ── SEARCH ────────────────────────────────────────────
let searchTimer = null;
let searchMarker = null;

const searchInput   = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');
const searchClear   = document.getElementById('search-clear');

function placeTypeIcon(type, cls) {
  const t = ((type||'') + (cls||'')).toLowerCase();
  if (t.includes('park') || t.includes('garden') || t.includes('grass')) return '🌳';
  if (t.includes('cafe') || t.includes('restaurant') || t.includes('bar')) return '☕';
  if (t.includes('hotel') || t.includes('hostel')) return '🏨';
  if (t.includes('school') || t.includes('university')) return '🏫';
  if (t.includes('hospital') || t.includes('pharmacy')) return '🏥';
  if (t.includes('church') || t.includes('worship')) return '⛪';
  if (t.includes('station') || t.includes('tram') || t.includes('bus')) return '🚉';
  if (t.includes('shop') || t.includes('mall')) return '🛍️';
  if (t.includes('museum') || t.includes('theatre') || t.includes('cinema')) return '🏛️';
  if (t.includes('road') || t.includes('street') || t.includes('strasse') || t.includes('gasse') || t.includes('weg')) return '🛣️';
  return '📍';
}

function shortAddress(item) {
  const a = item.address || {};
  return [a.road || a.pedestrian, a.suburb || a.city_district, a.city || a.town || 'Winterthur']
    .filter(Boolean).join(', ');
}

async function doSearch(q) {
  if (q.length < 2) { hideResults(); return; }
  showLoading();
  try {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q + ', Winterthur')}&addressdetails=1&limit=6&bounded=1&viewbox=8.68,47.52,8.78,47.47&accept-language=de`;
    let data = await (await fetch(url)).json();
    if (!data.length) {
      const url2 = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q + ' Winterthur')}&addressdetails=1&limit=5&accept-language=de`;
      data = await (await fetch(url2)).json();
    }
    renderResults(data);
  } catch(e) {
    searchResults.innerHTML = '<div class="result-msg">⚠ Suche nicht verfügbar</div>';
    searchResults.classList.add('visible');
  }
}

function renderResults(data) {
  if (!data.length) {
    searchResults.innerHTML = '<div class="result-msg">Keine Resultate gefunden</div>';
    searchResults.classList.add('visible');
    return;
  }
  searchResults.innerHTML = data.map(item => {
    const icon = placeTypeIcon(item.type, item.class);
    const name = item.display_name.split(',')[0];
    const sub  = shortAddress(item);
    const lat = parseFloat(item.lat).toFixed(6);
    const lon = parseFloat(item.lon).toFixed(6);
    return `<div class="result-item" onclick="selectResult(${lat},${lon},'${name.replace(/'/g,"\\'")}')">
      <span class="result-icon">${icon}</span>
      <div class="result-text">
        <div class="result-name">${name}</div>
        <div class="result-sub">${sub}</div>
      </div>
    </div>`;
  }).join('');
  searchResults.classList.add('visible');
}

function showLoading() {
  searchResults.innerHTML = '<div class="result-msg">Suche läuft…</div>';
  searchResults.classList.add('visible');
}
function hideResults() { searchResults.classList.remove('visible'); }

function selectResult(lat, lon, name) {
  map.flyTo([lat, lon], 17, { duration: 1.2 });
  if (searchMarker) map.removeLayer(searchMarker);
  searchMarker = L.circleMarker([lat, lon], {
    radius: 10, color: '#F59E0B', fillColor: '#FDE68A',
    fillOpacity: 0.9, weight: 2.5
  }).addTo(map).bindTooltip(name, { permanent: true, direction: 'top', offset:[0,-8] }).openTooltip();
  searchInput.value = name;
  searchClear.classList.add('visible');
  hideResults();
  searchInput.blur();
}

function clearSearch() {
  searchInput.value = '';
  searchClear.classList.remove('visible');
  hideResults();
  if (searchMarker) { map.removeLayer(searchMarker); searchMarker = null; }
  searchInput.focus();
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  searchClear.classList.toggle('visible', q.length > 0);
  clearTimeout(searchTimer);
  if (!q) { hideResults(); return; }
  searchTimer = setTimeout(() => doSearch(q), 350);
});

searchInput.addEventListener('keydown', e => { if (e.key === 'Escape') clearSearch(); });
map.on('click', hideResults);
</script>
